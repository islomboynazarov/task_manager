<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-top">
            <h1 class="logo">Task<span>Flow</span></h1>
        </div>
        <p class="tagline">stay on track, ship it</p>
    </header>

    <!-- Stats -->
    <div class="stats">
        <div class="stat">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Total</span>
        </div>
        <div class="stat">
            <span class="stat-value" id="stat-completed">0</span>
            <span class="stat-label">Done</span>
        </div>
        <div class="stat">
            <span class="stat-value" id="stat-remaining">0</span>
            <span class="stat-label">Left</span>
        </div>
    </div>

    <!-- Input -->
    <div class="input-area">
        <input
            type="text"
            class="task-input"
            id="task-input"
            placeholder="add a new task..."
            autocomplete="off"
        />
        <button class="add-btn" id="add-btn">+ Add</button>
    </div>

    <!-- Filters -->
    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <!-- Task List -->
    <ul class="task-list" id="task-list">
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">○</div>
            <p class="empty-text">no tasks here</p>
        </div>
    </ul>

    <div class="bottom-bar">
        <button class="clear-btn" id="clear-btn">clear completed</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
